name: Feature request
description: Suggest a user-facing improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: Do not include personal, credential, account, meter, address, usage or cost data.
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What Home Assistant outcome are you trying to achieve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behaviour
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
