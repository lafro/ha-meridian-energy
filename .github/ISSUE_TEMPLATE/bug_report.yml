name: Bug report
description: Report a reproducible Meridian Energy integration problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the integration. Search existing issues first.

        **Privacy warning:** do not paste email addresses, login codes, tokens, account or meter identifiers, addresses, usage, cost data, or unreviewed diagnostics into a public issue.
  - type: input
    id: version
    attributes:
      label: Integration version
      placeholder: 0.2.1
    validations:
      required: true
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: 2026.7.2
    validations:
      required: true
  - type: dropdown
    id: account_shape
    attributes:
      label: Account shape
      options:
        - One account, one property, no grid export
        - One account, multiple properties
        - Multiple accounts
        - Grid export/feed-in present
        - Prefer not to say
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the expected and actual behaviour without personal or energy data.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs or diagnostics
      description: Review every line before pasting. Remove any personal, credential, account, meter, address, usage or cost data.
      render: text
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I reviewed the content above and removed all personal, credential and energy data.
          required: true
        - label: I am not reporting a security vulnerability. Security issues belong in a private vulnerability report.
          required: true
