name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Stable release tag matching the committed version (for example v0.2.2)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  python:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv sync --all-groups --frozen
      - name: Validate release tag and committed versions
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          uv run python scripts/check_versions.py "$RELEASE_TAG"
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy custom_components/meridian_energy
      - run: uv run pytest
      - run: uv run python scripts/check_module_coverage.py

  hassfest:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c

  hacs:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa
        with:
          category: integration

  release:
    if: github.ref == 'refs/heads/main'
    needs: [python, hassfest, hacs]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Create and verify immutable release tag
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          existing_sha="$(
            gh api "repos/$GH_REPO/git/matching-refs/tags/$RELEASE_TAG" \
              --jq ".[] | select(.ref == \"refs/tags/$RELEASE_TAG\") | .object.sha"
          )"
          if [[ -n "$existing_sha" && "$existing_sha" != "$GITHUB_SHA" ]]; then
            echo "Release tag already points to a different commit" >&2
            exit 1
          fi
          if [[ -z "$existing_sha" ]]; then
            gh api --method POST "repos/$GH_REPO/git/refs" \
              -f ref="refs/tags/$RELEASE_TAG" \
              -f sha="$GITHUB_SHA" >/dev/null
          fi
          verified_sha="$(
            gh api "repos/$GH_REPO/git/ref/tags/$RELEASE_TAG" --jq '.object.sha'
          )"
          [[ "$verified_sha" == "$GITHUB_SHA" ]]
      - name: Publish stable release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: >-
          gh release create "$RELEASE_TAG"
          --verify-tag
          --title "$RELEASE_TAG"
          --generate-notes
          --fail-on-no-commits
