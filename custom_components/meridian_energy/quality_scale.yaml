rules:
  # Bronze
  action-setup:
    status: exempt
    comment: The integration does not provide actions.
  appropriate-polling: done
  brands:
    status: todo
    comment: Local HACS brand assets are complete; an official brands repository submission belongs with any future Core proposal.
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: The integration does not provide actions.
  docs-conditions:
    status: exempt
    comment: The integration does not provide conditions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  docs-triggers:
    status: exempt
    comment: The integration does not provide triggers.
  entity-event-setup:
    status: exempt
    comment: The integration does not subscribe to entity events.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: The integration does not provide actions.
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done

  # Gold
  devices: done
  diagnostics: done
  discovery-update-info:
    status: exempt
    comment: The integration does not support discovery.
  discovery:
    status: exempt
    comment: Meridian accounts are authenticated cloud resources, not discoverable devices.
  docs-data-update: done
  docs-examples:
    status: todo
    comment: No supported automation blueprint has been published yet.
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices: done
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: done
  repair-issues:
    status: exempt
    comment: Authentication failures use reauthentication and transient cloud failures recover through the coordinator.
  stale-devices: done

  # Platinum
  async-dependency:
    status: todo
    comment: The HACS integration deliberately embeds its asynchronous private-API client; Core submission would require an external library.
  inject-websession: done
  strict-typing: done
